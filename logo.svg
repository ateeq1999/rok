<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient Definition -->
    <linearGradient id="rokGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#rokGradient)" opacity="0.1"/>

  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#rokGradient)" stroke-width="3" opacity="0.6"/>

  <!-- Letter R - Abstract -->
  <g filter="url(#shadow)">
    <!-- R vertical stem -->
    <rect x="65" y="55" width="12" height="70" rx="6" fill="url(#rokGradient)"/>

    <!-- R curved top -->
    <path d="M 77 65 Q 77 55 90 55 Q 105 55 105 70 Q 105 80 90 80 L 77 80"
          fill="none" stroke="url(#rokGradient)" stroke-width="10" stroke-linecap="round"/>

    <!-- R diagonal leg -->
    <line x1="90" y1="80" x2="105" y2="115" stroke="url(#rokGradient)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Orbit Rings (representing execution/automation) -->
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="url(#rokGradient)" stroke-width="2" opacity="0.4" transform="rotate(-30 100 100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="25" fill="none" stroke="url(#rokGradient)" stroke-width="2" opacity="0.4" transform="rotate(30 100 100)"/>

  <!-- Center Dot (representing "One JSON") -->
  <circle cx="100" cy="100" r="6" fill="url(#rokGradient)" filter="url(#glow)"/>

  <!-- Small accent dots (representing "All Changes") -->
  <circle cx="140" cy="70" r="3" fill="url(#rokGradient)" opacity="0.8"/>
  <circle cx="60" cy="130" r="3" fill="url(#rokGradient)" opacity="0.8"/>
  <circle cx="145" cy="125" r="3" fill="url(#rokGradient)" opacity="0.6"/>
</svg>
