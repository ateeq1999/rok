<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="16" cy="16" r="15" fill="url(#favGradient)"/>

  <!-- Letter R (simplified) -->
  <g fill="white">
    <!-- R vertical stem -->
    <rect x="10" y="9" width="3" height="14" rx="1.5"/>

    <!-- R curved top -->
    <path d="M 13 11 Q 13 9 16 9 Q 19 9 19 12 Q 19 14 16 14 L 13 14"
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

    <!-- R diagonal leg -->
    <line x1="16" y1="14" x2="19" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Center Dot -->
  <circle cx="16" cy="16" r="2" fill="white" opacity="0.9"/>
</svg>
